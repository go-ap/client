image: archlinux
packages:
  - go
  - golangci-lint
sources:
  - https://github.com/go-ap/client
secrets:
  - 03a5baad-1226-4b03-a01e-773c747c141f
environment:
  GO111MODULE: 'on'
tasks:
  - fmt: |
      cd client
      test -z $(gofmt -l .)
  - tests: |
      cd client
      make test
  - lint: |
      cd client
      golangci-lint run --fast-only
  - coverage: |
      cd client
      git switch -C master origin/master
      make coverage
      go tool goveralls -flagname unit-tests -service=${CI_NAME} -coverprofile client.coverprofile -repotokenfile ~/.coveralls.tok
